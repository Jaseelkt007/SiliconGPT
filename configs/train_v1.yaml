# V1 base-LM training config.
seed: 42

# data (paths relative to repo root)
data_dir: data
train_file: train_pool.csv
val_file: val_id.csv
vocab_file: vocab.json
out_dir: extras/results
ckpt_dir: checkpoints

# optimization
batch_size: 64
max_iters: 4000          # the grammar saturates by ~iter 500; early stopping ends it sooner
warmup_iters: 100
lr: 0.0006
min_lr: 0.00006
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0

# evaluation / early stopping / logging
eval_interval: 200
eval_iters: 50           # number of FIXED family-balanced val batches scored each eval
patience: 8              # stop after this many evals with no val_loss improvement
log_interval: 50

# Weights & Biases (set true to enable; on Leonardo compute nodes use WANDB_MODE=offline)
wandb: false
wandb_project: silicongpt

# Description-init: path to emb_init.npz (build with scripts/build_emb_init.py on a login node).
# null = random init. Overridden by --emb-init.
emb_init_file: null
