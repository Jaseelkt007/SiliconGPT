# V1 base-LM training config.
seed: 42

# data (paths relative to repo root)
data_dir: data
train_file: train_pool.csv
val_file: val_id.csv
vocab_file: vocab.json
out_dir: extras/results
ckpt_dir: checkpoints

# optimization
batch_size: 64
max_iters: 20000
warmup_iters: 200
lr: 0.0006
min_lr: 0.00006
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0

# evaluation / logging
eval_interval: 500
eval_iters: 50
log_interval: 50
